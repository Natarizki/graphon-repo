name: Build Graphon Native Binary (ARM64 via QEMU)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Build Native Binary in ARM64 Container
      run: |
        docker run --rm -v $PWD:/work -w /work arm64v8/ubuntu:22.04 bash -c '
        set -e
        apt-get update
        apt-get install -y wget unzip gcc g++ zlib1g-dev
        
        echo "=== Installing GraalVM ==="
        wget -q https://github.com/graalvm/graalvm-ce-builds/releases/download/vm-22.3.1/graalvm-ce-java17-linux-aarch64-22.3.1.tar.gz
        tar -xzf graalvm-ce-java17-linux-aarch64-22.3.1.tar.gz -C /opt
        export JAVA_HOME=/opt/graalvm-ce-java17-22.3.1
        export PATH=$JAVA_HOME/bin:$PATH
        
        echo "=== Installing native-image ==="
        gu install native-image
        
        echo "=== Installing Groovy ==="
        wget -q https://groovy.jfrog.io/artifactory/dist-release-local/groovy-zips/apache-groovy-binary-4.0.18.zip
        unzip -q apache-groovy-binary-4.0.18.zip -d /opt
        export PATH=/opt/groovy-4.0.18/bin:$PATH
        
        echo "=== Compiling Groovy to JAR ==="
        mkdir -p classes
        groovyc graphon.groovy -d classes
        jar cf graphon.jar -C classes .
        
        echo "=== Building Native Image ==="
        native-image -cp "classes:/opt/groovy-4.0.18/lib/groovy-4.0.18.jar" graphon \
          --no-fallback \
          -H:+ReportExceptionStackTraces
          
        echo "=== Fixing Permissions ==="
        chmod 777 graphon
        '

    - name: Verify Binary Architecture
      run: |
        file graphon
        ls -lh graphon

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: graphon-linux-aarch64
        path: graphon
