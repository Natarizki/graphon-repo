name: Build Graphon Native Binary

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup GraalVM
      uses: graalvm/setup-graalvm@v1
      with:
        java-version: '17'
        distribution: 'graalvm-community'
        components: 'native-image'
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Groovy (Direct Download)
      run: |
        # Download Groovy 4.0.18 binary zip
        curl -sL https://groovy.jfrog.io/artifactory/dist-release-local/groovy-zips/apache-groovy-binary-4.0.18.zip -o groovy.zip
        unzip -q groovy.zip -d $HOME
        # Add Groovy to PATH
        echo "$HOME/groovy-4.0.18/bin" >> $GITHUB_PATH

    - name: Verify Installations
      run: |
        java -version
        native-image --version
        groovyc -version

    - name: Compile Groovy to JAR
      run: |
        mkdir -p classes
        # Compile graphon.groovy ke Java class
        groovyc graphon.groovy -d classes
        # Package ke JAR
        jar cf graphon.jar -C classes .

    - name: Install ARM64 Cross-Compiler
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

    - name: Build Native Image (Linux ARM64)
      run: |
        # Cari lokasi groovy jar untuk classpath
        GROOVY_JAR=$(find $HOME/groovy-4.0.18/lib -name "groovy-4.0.18.jar")
        
        # Kompilasi ke native binary target linux-aarch64
        # Memasukkan groovy.jar ke classpath agar native-image mengenali class Groovy
        native-image -cp "classes:$GROOVY_JAR" graphon \
          --no-fallback \
          -H:+ReportExceptionStackTraces \
          --target=linux-aarch64 \
          -H:NativeLinkerOption=-static

    - name: Verify Binary Architecture
      run: |
        file graphon
        ls -lh graphon

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: graphon-linux-aarch64
        path: graphon
